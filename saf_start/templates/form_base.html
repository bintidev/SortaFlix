{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    {% block title %}<title>RentaFlix</title>{% endblock %}
    {% block favicon %}<link rel="shortcut icon" href="{% static 'img/favicon_english_color.png' %}" type="image/x-icon">{% endblock favicon %}
    {% block fonts %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% endblock fonts %}
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #09090f; color: #e2e8f0; font-family: Manrope, sans-serif; margin: 0; }
        input:not([type=checkbox]):not([type=radio]):not([type=submit]):not([type=reset]):not([type=file]),
        select, textarea {
            width: 100%; background: #0a0a16; border: 1px solid #1e1e38;
            color: #e2e8f0; padding: 10px 14px; border-radius: 6px;
            font-family: Manrope, sans-serif; font-size: 0.875rem;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: #6C63FF; box-shadow: 0 0 0 3px rgba(108,99,255,0.12); }
        input[type=checkbox], input[type=radio] { accent-color: #6C63FF; cursor: pointer; }
        select option { background: #0a0a16; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        .btn-primary {
            display:inline-block; background:#6C63FF; color:#fff;
            font-family:Manrope,sans-serif; font-size:0.85rem; font-weight:600;
            padding:11px 24px; border-radius:6px; border:none; cursor:pointer;
            text-decoration:none; transition:background 0.2s, transform 0.15s;
        }
        .btn-primary:hover { background:#5d54d9; transform:translateY(-1px); }
        .btn-ghost {
            display:inline-block; background:transparent; color:rgba(255,255,255,0.4);
            font-family:Manrope,sans-serif; font-size:0.85rem; font-weight:600;
            padding:10px 20px; border-radius:6px; border:1px solid #1e1e38; cursor:pointer;
            text-decoration:none; transition:color 0.2s, border-color 0.2s;
        }
        .btn-ghost:hover { color:#fff; border-color:#4ECDC4; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:#09090f; }
        ::-webkit-scrollbar-thumb { background:#1a1a2e; border-radius:4px; }
    </style>
</head>
<body>
    <div style="min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:4rem 1.5rem;">
        <div style="width:100%; max-width:700px; animation:fadeUp 0.4s ease both;">

            <!-- Barra de acento superior -->
            <div style="height:3px; background:linear-gradient(to right,#6C63FF,#4ECDC4); border-radius:3px 3px 0 0;"></div>

            <!-- Contenedor del formulario -->
            <div style="background:#0e0e1c; border:1px solid #161628; border-top:none;
                        border-radius:0 0 12px 12px; padding:2.5rem 2.5rem 3rem;">

                <div style="margin-bottom:2rem;">
                    {% block heading %}
                    <h1 class="font-[Outfit] font-bold text-white"
                        style="font-size:1.75rem; letter-spacing:-0.03em; margin-bottom:0.4rem;">Form</h1>
                    <p class="font-[Manrope] text-sm" style="color:#3a4a5c;">Fill in the details below.</p>
                    {% endblock heading %}
                </div>

                {% block form_fields %}{% endblock form_fields %}
            </div>
        </div>
    </div>
</body>
</html>
